name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/spillthetea-ci
      MONGODB_DB: spillthetea-ci
      AUTH_SECRET: ci-only-placeholder-secret-change-in-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
