name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/spillthetea-ci
      MONGODB_DB: spillthetea-ci
      AUTH_SECRET: ci-only-placeholder-secret-change-in-production
      NEXT_PUBLIC_APP_URL: https://spilltheteahere.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log || {
            echo "--- build failed; last 80 lines ---"
            tail -80 build.log
            echo "--- source locations ---"
            grep -E '\./src/[^ ]+\.[0-9]+:[0-9]+' build.log || true
            while IFS= read -r line; do
              case "$line" in
                *"Type error"*|*"Error:"*|*"Failed"*|*"Module not found"*|*"./src/"*)
                  echo "::error title=next build::$line"
                  ;;
              esac
            done < build.log
            exit 1
          }
